<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
      --spotify: #1DB954;
      --apple: #0b0b0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
      transition: padding 0.45s ease;
    }

    .wrap.results-active {
      padding-top: 4px;
    }

    .header {
  position: relative;
  isolation: isolate;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 220px;
  margin-bottom: 26px;
  overflow: visible;
  transition: min-height 0.45s ease, margin-bottom 0.45s ease;
}

    .header::before {
  content: "";
  position: absolute;
  inset: -140px -60px -260px -60px; /* bigger + lifted upward */
  background:
    radial-gradient(circle at 50% 48%, rgba(255, 138, 61, 0.30), transparent 22%),
    radial-gradient(circle at 50% 45%, rgba(255, 59, 226, 0.32), transparent 36%),
    radial-gradient(circle at 50% 42%, rgba(106, 61, 255, 0.42), transparent 65%);
  pointer-events: none;
  z-index: -1;
  filter: blur(52px); /* softer + bigger spread */
}

    .header::after {
      content: "";
      position: absolute;
      inset: -120px -60px -260px -60px;
      background:
        radial-gradient(circle at 50% 50%, rgba(42, 155, 255, 0.15), transparent 60%);
      filter: blur(60px);
      pointer-events: none;
      z-index: -1;
      opacity: 1;
      transition: inset 0.45s ease, filter 0.45s ease, opacity 0.45s ease;
    }

    . {
      position: relative;
      z-index: 1;
      display: block;
      height: auto;
      object-fit: contain;
      animation: logoFade 0.8s ease;
      transition: opacity 0.45s ease, transform 0.45s ease, max-width 0.45s ease, width 0.45s ease;
      filter:
        drop-shadow(0 10px 24px rgba(255, 59, 226, 0.16))
        drop-shadow(0 18px 42px rgba(106, 61, 255, 0.20));
    }

    .-main {
      width: 100%;
      max-width: 620px;
      opacity: 1;
      transform: scale(1);
    }

    .hero-logo-compact {
  position: absolute;
  height: 72px;
  width: auto;
  max-width: 86vw;
  opacity: 0;
  visibility: hidden;
  transform: scale(0.94);
  pointer-events: none;
}

    .wrap.results-active .header {
  min-height: 0;
  height: 108px;
  margin-bottom: 8px;
  align-items: center;
}

    .wrap.results-active .header::before {
  inset: -55px -55px -95px -55px;
  filter: blur(38px);
  opacity: 0.78;
}

    .wrap.results-active .header::after {
  inset: -65px -65px -110px -65px;
  filter: blur(54px);
  opacity: 0.5;
}

    .wrap.results-active .hero-logo-main {
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .wrap.results-active .hero-logo-compact {
  opacity: 1;
  visibility: visible;
  transform: scale(1);
}

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: -6px;
      margin-bottom: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: font-size 0.45s ease, margin 0.45s ease;
    }

    .wrap.results-active .subtitle {
  display: none;
}

    .subtitle-icon {
      display: block;
      margin-top: 6px;
      font-size: 1.2rem;
      opacity: 0.7;
    }

    .grid {
      display: block;
      transition: all 0.35s ease;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-top: 14px;
    }

    #entryCard {
      transition: all 0.35s ease;
    }

    .wrap.results-active #entryCard {
      padding: 10px 12px;
    }

    .entry-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .entry-controls input {
      flex: 1;
      margin: 0;
    }

    .entry-controls button {
      width: auto;
      margin: 0;
      padding: 12px 18px;
      white-space: nowrap;
    }

    .wrap.results-active #entryCard label {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .wrap.results-active #entryCard input {
      padding: 10px 14px;
      min-height: 44px;
    }

    .wrap.results-active #entryCard button {
      padding: 10px 18px;
      min-height: 44px;
    }

    .wrap.results-active #rangeNote {
      opacity: 0;
      max-height: 0;
      margin: 0;
      overflow: hidden;
      transform: translateY(-4px);
      pointer-events: none;
    }

    #birthCard {
      display: none;
      opacity: 0;
      transform: translateY(14px);
    }

    .wrap.results-active #birthCard {
      display: block;
      animation: cardReveal 0.45s ease forwards;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
      transition: opacity 0.22s ease, max-height 0.22s ease, margin-bottom 0.22s ease, transform 0.22s ease;
      overflow: hidden;
    }

    input {
  width: 100%;
  padding: 14px;
  min-height: 52px;
  border-radius: 12px;
  border: 1px solid transparent;
  background:
    linear-gradient(#0a1020, #0a1020) padding-box,
    linear-gradient(90deg, var(--blue), var(--pink), var(--orange)) border-box;
  color: white;
  font-size: 1rem;
  transition:
    padding 0.28s ease,
    min-height 0.28s ease,
    border-radius 0.28s ease,
    box-shadow 0.25s ease;
}

input:focus {
  outline: none;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.05),
    0 0 12px rgba(255, 59, 226, 0.35),
    0 0 22px rgba(42, 155, 255, 0.25);
}

input:focus {
  background:
    linear-gradient(#0a1020, #0a1020) padding-box,
    linear-gradient(120deg, var(--blue), var(--pink), var(--orange), var(--blue)) border-box;
  background-size: 200% 200%;
}
    
    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      min-height: 52px;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      cursor: pointer;
      transition: padding 0.28s ease, min-height 0.28s ease, border-radius 0.28s ease, opacity 0.2s ease;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .accent-heading {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .song-hero {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.4rem;
      line-height: 1.2;
      text-align: center;
      margin-bottom: 8px;
    }

    .artist {
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 10px;
      text-align: left;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      transition: all 0.22s ease;
    }

    .spotify-embed {
  margin-top: 14px;
  border-radius: 16px;
  overflow: hidden;

  padding: 6px; /* ← THIS creates the thick frame */

  background:
    linear-gradient(#0a1020, #0a1020) padding-box,
    linear-gradient(135deg, #1DB954, #1ed760) border-box;

  border: 2px solid transparent;

  box-shadow:
    0 0 0 2px rgba(29,185,84,0.35),
    0 10px 28px rgba(0,0,0,0.4);
}

    .spotify-embed iframe {
  display: block;
  width: 100%;
  height: 152px; /* fixed height prevents layout shift */
  border: 0;
  border-radius: 10px; /* matches inner frame nicely */
}

.spotify-embed-wrap {
  margin-top: 14px;
}

.spotify-embed {
  box-shadow:
    0 0 0 1px rgba(29,185,84,0.15),
    0 8px 24px rgba(0,0,0,0.35);
}
    
.spotify-label {
  font-size: 0.85rem;
  font-weight: 700;
  color: #1DB954;
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}
    
    .year-card {
      border-radius: 20px;
      padding: 14px;
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(31,10,48,0.98), rgba(16,7,29,0.96));
      border: 1px solid rgba(255, 59, 226, 0.18);
    }

    .year-card-rich {
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 8px 20px rgba(0,0,0,0.18);
    }

    .year-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .year-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #b9a6d9;
      font-size: 1rem;
      min-width: 0;
      flex-wrap: wrap;
    }

    .year-meta {
  flex: 1;
  min-width: 0;
}

.music-buttons {
  flex-shrink: 0;
}

    .year-card-body {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: start;
    }

    .year-art {
      width: 86px;
      height: 86px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      background: #140d22;
    }

    .year-copy {
      min-width: 0;
    }

    .year-song-title {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.32rem;
      line-height: 1.08;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .year-song-artist {
      color: #ff9a54;
      font-weight: 700;
      font-size: 0.98rem;
      line-height: 1.25;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .music-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .music-buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .music-buttons img {
      display: block;
      height: 34px;
      width: auto;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .music-buttons img:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .full-music-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 14px;
}

.full-music-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 46px;
  padding: 12px 14px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 800;
  font-size: 0.95rem;
  color: white;
  transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
}

.full-music-button:hover {
  transform: translateY(-1px);
  opacity: 0.95;
  box-shadow: 0 8px 20px rgba(0,0,0,0.28);
}

.spotify-full {
  background: linear-gradient(135deg, #1DB954, #159947);
}

.apple-full {
  background: linear-gradient(135deg, #111827, #0b0b0f);
  border: 1px solid rgba(255,255,255,0.12);
}

.full-music-buttons.single {
  display: block;
}

.full-music-buttons.single .full-music-button {
  width: 100%;
}
    
    .trivia-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      background: transparent;
      border: none;
      color: #b8a6d8;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      min-height: auto;
      width: auto;
      margin-top: 0;
    }

    .trivia-toggle:hover {
      color: #e2c9ff;
      opacity: 1;
    }

    .trivia-toggle[aria-expanded="true"] .trivia-caret {
      transform: rotate(180deg);
    }

    .trivia-caret {
      display: inline-block;
      transition: transform 0.22s ease;
    }

    .year-trivia {
      margin-top: 12px;
      color: #d8d0e8;
      line-height: 1.55;
      font-size: 0.94rem;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(181, 189, 212, 0.6);
    }

    .loading-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  background: rgba(2, 6, 23, 0.84);
  backdrop-filter: blur(8px);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
  padding: 24px;
}

    .loading-overlay.active {
      display: flex;
      opacity: 1;
      pointer-events: auto;
    }

    .turntable {
  position: relative;
  width: min(72vw, 360px);
  height: min(72vw, 360px);
  margin: 0 auto;
}

.vinyl-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 260px;
  height: 260px;
  transform: translate(-50%, -50%);
}

.vinyl {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 28%, rgba(255,255,255,.18), transparent 0 18%, transparent 19%),
    radial-gradient(circle at center, #0a0f1c 0 9%, #bcc7d6 9% 10.2%, #101827 10.2% 18%, transparent 18.1%),
    repeating-radial-gradient(circle at center,
      rgba(255,255,255,.055) 0 1px,
      rgba(6,10,18,.96) 1px 5px,
      rgba(19,26,39,.98) 5px 8px,
      rgba(6,10,18,.98) 8px 11px);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.04),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 0 0 14px rgba(15, 23, 42, 0.52),
    0 22px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  will-change: transform;
  transform: rotate(0deg);
}

.vinyl::before {
  content: "";
  position: absolute;
  inset: 29%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 38% 35%, rgba(255,255,255,.28), transparent 0 16%, transparent 17%),
    radial-gradient(circle at center, #eff6ff 0 10%, #2A9BFF 10% 36%, #FF3BE2 36% 62%, #6A3DFF 62% 100%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
}

.vinyl::after {
  content: "";
  position: absolute;
  inset: 48.6%;
  border-radius: 50%;
  background: #f8fafc;
  box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.22);
  z-index: 2;
}

.vinyl-center-icon {
  position: absolute;
  width: 22%;
  max-width: 58px;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  border-radius: 16px;
  pointer-events: none;
}

.vinyl-shine {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 260px;
  height: 260px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 34%);
  filter: blur(1px);
  pointer-events: none;
  z-index: 2;
}

.tonearm {
  position: absolute;
  right: 34px;
  top: 62px;
  width: 152px;
  height: 12px;
  transform-origin: 100% 50%;
  transform: rotate(-90deg);
  z-index: 4;
  animation:
    tonearm-seek 3.4s linear forwards,
    tonearm-vibrate 2.2s ease-in-out 3.45s infinite;
}

/* pivot/base stays fixed */
.tonearm::before {
  content: "";
  position: absolute;
  right: -10px;
  top: -6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #e2e8f0, #64748b 72%);
  box-shadow: 0 0 0 6px rgba(51,65,85,.45);
}

/* shaft only */
.tonearm-shaft {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 12px;
  background: linear-gradient(90deg, #64748b, #94a3b8 42%, #cbd5e1);
  box-shadow: 0 2px 10px rgba(0,0,0,.28);
  transform-origin: 100% 50%;
  transform: scaleX(1);
  border-radius: 999px;
  clip-path: polygon(
    0% 0%,
    100% 0%,
    100% 100%,
    0% 100%
  );
  animation:
    tonearm-lower 3.4s linear forwards,
    tonearm-lower-vibrate 2.2s ease-in-out 3.45s infinite;
}

/* tip sits on shaft and compresses slightly more */
.tonearm-shaft::after {
  content: "";
  position: absolute;
  left: 0;
  top: 1px;
  width: 22px;
  height: 10px;
  border-radius: 3px;
  background: linear-gradient(90deg, #f87171, #e2e8f0);
  box-shadow:
    0 1px 3px rgba(0,0,0,.25),
    0 0 6px rgba(248,113,113,0.18);
  transform-origin: left center;
  animation:
    needle-lower 3.4s linear forwards,
    needle-vibrate 2.2s ease-in-out 3.45s infinite;
}

.tonearm::after {
  content: "";
  position: absolute;
  left: 0;
  top: 1px;
  width: 22px;
  height: 10px;
  border-radius: 3px;
  background: linear-gradient(90deg, #f87171, #e2e8f0);
  box-shadow:
    0 1px 3px rgba(0,0,0,.25),
    0 0 6px rgba(248,113,113,0.18);
  transform-origin: left center;
}


@keyframes tonearm-seek {
  0%   { transform: rotate(-90deg); }
  5%   { transform: rotate(-90deg); }
  10%  { transform: rotate(-86deg); }
  20%  { transform: rotate(-78deg); }
  30%  { transform: rotate(-70deg); }
  40%  { transform: rotate(-62deg); }
  50%  { transform: rotate(-54deg); }
  54%  { transform: rotate(-54deg); }
  60%  { transform: rotate(-59.04deg); }
  70%  { transform: rotate(-67.44deg); }
  80%  { transform: rotate(-75.84deg); }
  86%  { transform: rotate(-80deg); }
  100% { transform: rotate(-80deg); }
}
@keyframes tonearm-lower {
  0% {
    transform: scaleX(1);
    clip-path: polygon(
      0% 0%,
      100% 0%,
      100% 100%,
      0% 100%
    );
  }

  89% {
    transform: scaleX(1);
    clip-path: polygon(
      0% 0%,
      100% 0%,
      100% 100%,
      0% 100%
    );
  }

  92% {
    transform: scaleX(0.98);
    clip-path: polygon(
      0% 2%,
      100% 0%,
      100% 100%,
      0% 98%
    );
  }

  95% {
    transform: scaleX(0.95);
    clip-path: polygon(
      0% 4%,
      100% 0%,
      100% 100%,
      0% 96%
    );
  }

  98% {
    transform: scaleX(0.92);
    clip-path: polygon(
      0% 7%,
      100% 0%,
      100% 100%,
      0% 93%
    );
  }

  100% {
    transform: scaleX(0.90);
    clip-path: polygon(
      0% 10%,
      100% 0%,
      100% 100%,
      0% 90%
    );
  }
}

    @keyframes needle-lower {
  0%   { transform: scaleX(1) scaleY(1); }
  89%  { transform: scaleX(1) scaleY(1); }
  92%  { transform: scaleX(0.98) scaleY(0.98); }
  95%  { transform: scaleX(0.94) scaleY(0.95); }
  98%  { transform: scaleX(0.91) scaleY(0.93); }
  100% { transform: scaleX(0.88) scaleY(0.91); }
}

    @keyframes tonearm-vibrate {
  0%   { transform: rotate(-80deg); }
  25%  { transform: rotate(-80.12deg); }
  50%  { transform: rotate(-79.92deg); }
  75%  { transform: rotate(-80.08deg); }
  100% { transform: rotate(-80deg); }
}

@keyframes tonearm-lower-vibrate {
  0% {
    transform: scaleX(0.90);
    clip-path: polygon(
      0% 10%,
      100% 0%,
      100% 100%,
      0% 90%
    );
  }

  25% {
    transform: scaleX(0.902);
    clip-path: polygon(
      0% 9.6%,
      100% 0%,
      100% 100%,
      0% 90.4%
    );
  }

  50% {
    transform: scaleX(0.898);
    clip-path: polygon(
      0% 10.4%,
      100% 0%,
      100% 100%,
      0% 89.6%
    );
  }

  75% {
    transform: scaleX(0.901);
    clip-path: polygon(
      0% 9.8%,
      100% 0%,
      100% 100%,
      0% 90.2%
    );
  }

  100% {
    transform: scaleX(0.90);
    clip-path: polygon(
      0% 10%,
      100% 0%,
      100% 100%,
      0% 90%
    );
  }
}

@keyframes needle-vibrate {
  0%   { transform: scaleX(0.88) scaleY(0.91); }
  25%  { transform: scaleX(0.882) scaleY(0.912); }
  50%  { transform: scaleX(0.878) scaleY(0.908); }
  75%  { transform: scaleX(0.881) scaleY(0.911); }
  100% { transform: scaleX(0.88) scaleY(0.91); }
}
    
}
