<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Life Tracks</title>

<style>
.wrap.results-active label {
  opacity:0;
  max-height:0;
  transition:0.3s;
}

.entry-controls {
  display:flex;
  gap:10px;
}

.wrap.results-active input {
  height:40px;
}

.wrap.results-active button {
  height:40px;
}
</style>

</head>

<body>

<div class="wrap">

<label>Your birthday</label>

<div class="entry-controls">
<input id="birthday" type="date">
<button id="go">Find</button>
</div>

<div id="birthCard" style="display:none;">
<div id="birthResult"></div>
</div>

<div id="yearlyCard" style="display:none;">
<div id="yearlyResult"></div>
</div>

</div>

<script src="/app.js"></script>

</body>
</html>
