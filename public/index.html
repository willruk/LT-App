<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --red: #FF4A65;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 16px;
    }

    .hero-logo {
      width: 80%;
      max-width: 420px;
      height: auto;
      object-fit: contain;
      display: block;
      animation: logoFade 0.8s ease;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 16px;
      text-align: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #1f2a44;
      background: #0a1020;
      color: white;
      font-size: 1rem;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .accent-heading {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .song-hero {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.4rem;
    }

    .artist {
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .year-card {
      border-top: 1px solid #1f2a44;
      padding-top: 10px;
      margin-top: 10px;
    }

    .year-header {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      gap: 10px;
    }

    .year {
      color: var(--pink);
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: var(--muted);
    }

    @keyframes logoFade {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (min-width: 860px) {
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .hero-logo {
        max-width: 520px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img src="/logo.png" class="hero-logo" alt="Life Tracks logo" />
    </div>

    <p class="subtitle">
      Enter your birthday to discover the number one song on the day you were born, then see every birthday after that.
    </p>

    <div class="grid">
      <div class="card">
        <label for="birthday">Your birthday</label>
        <input id="birthday" type="date">
        <button id="go">Find my songs</button>
        <p id="rangeNote" class="note"></p>
      </div>

      <div class="card">
        <h2 class="accent-heading">Number one on your birthdate</h2>
        <div id="birthResult" class="note"></div>
      </div>
    </div>

    <div class="card">
      <h2 class="accent-heading">Here are the hottest tracks from all of your birthdays</h2>
      <div id="yearlyResult" class="note"></div>
    </div>
  </div>

  <script src="/app.js?v=4"></script>
</body>
</html>
