<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
    }

    /* HEADER */

    .header {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .hero-logo {
      max-width: 520px;
      width: 100%;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* CARDS */

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px; /* rounded */
      padding: 16px;
      margin-top: 14px;
    }

    .accent-heading {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
    }

    /* INPUT */

    .entry-controls {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #1f2a44;
      background: #0a1020;
      color: white;
    }

    button {
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      cursor: pointer;
    }

    /* BIRTH SONG */

    .song-hero {
      color: var(--pink);
      font-size: 1.4rem;
      font-weight: 900;
      text-align: center;
    }

    .artist {
      color: var(--orange);
      text-align: center;
      margin-bottom: 10px;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* YEAR CARDS (NEW STYLE) */

    .year-card {
      border-radius: 20px;
      padding: 14px;
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(31,10,48,0.98), rgba(16,7,29,0.96));
      border: 1px solid rgba(255, 59, 226, 0.18);
    }

    .year-meta {
      margin-bottom: 10px;
      color: #b9a6d9;
    }

    .year-card-body {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
    }

    .year-art {
      width: 86px;
      height: 86px;
      border-radius: 16px;
      object-fit: cover;
      background: #111;
    }

    .year-song-title {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.2rem;
    }

    .year-song-artist {
      color: var(--orange);
      margin-bottom: 10px;
    }

    /* BUTTON IMAGES */

    .music-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .music-buttons img {
      height: 36px;
      transition: transform 0.2s ease;
    }

    .music-buttons img:hover {
      transform: scale(1.05);
    }

    /* TRIVIA */

    .trivia-toggle {
      background: none;
      border: none;
      color: #b8a6d8;
      cursor: pointer;
      font-weight: 600;
    }

    .year-trivia {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #d8d0e8;
    }

    /* REMOVE OLD TIMELINE ELEMENTS */

    .year-timeline::before,
    .timeline-dot {
      display: none !important;
    }

    /* LOADING */

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      color: white;
    }

    .loading-overlay.active {
      display: flex;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="header">
      <img src="/logo.png" class="hero-logo" />
    </div>

    <p class="subtitle">
      Enter your Birthday to discover the #1 song on the day you were born and every Birthday since 🎶
    </p>

    <div class="card">
      <div class="entry-controls">
        <input id="birthday" type="date">
        <button id="go">Find my songs</button>
      </div>
      <p id="rangeNote" class="note"></p>
    </div>

    <div class="card" id="birthCard" style="display:none;">
      <h2 class="accent-heading">Number one on the day you were born</h2>
      <div id="birthResult"></div>
    </div>

    <div class="card" id="yearlyCard" style="display:none;">
      <h2 class="accent-heading">Your Life Tracks</h2>
      <div id="yearlyResult"></div>
    </div>

  </div>

  <div id="loadingOverlay" class="loading-overlay">
    Finding your tracks…
  </div>

  <script src="/app.js"></script>
</body>
</html>
