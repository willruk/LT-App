<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
      --spotify: #1DB954;
      --apple: #0b0b0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
      transition: padding 0.45s ease;
    }

    .wrap.results-active {
      padding-top: 7px;
    }

    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      margin-bottom: 26px;
      overflow: visible;
      transition: min-height 0.45s ease, margin-bottom 0.45s ease;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: -80px -40px -220px -40px;
      background:
        radial-gradient(circle at 50% 60%, rgba(255, 138, 61, 0.28), transparent 22%),
        radial-gradient(circle at 50% 55%, rgba(255, 59, 226, 0.30), transparent 36%),
        radial-gradient(circle at 50% 52%, rgba(106, 61, 255, 0.40), transparent 65%);
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
      mask-image: linear-gradient(
        to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 50%,
        rgba(0,0,0,0.7) 70%,
        rgba(0,0,0,0.25) 88%,
        rgba(0,0,0,0) 100%
      );
      transition:
        inset 0.45s ease,
        filter 0.45s ease,
        opacity 0.45s ease;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: -120px -60px -260px -60px;
      background:
        radial-gradient(circle at 50% 50%, rgba(42, 155, 255, 0.15), transparent 60%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      transition:
        inset 0.45s ease,
        filter 0.45s ease,
        opacity 0.45s ease;
    }

    .hero-logo {
      position: relative;
      z-index: 1;
      display: block;
      height: auto;
      object-fit: contain;
      animation: logoFade 0.8s ease;
      transition:
        opacity 0.45s ease,
        transform 0.45s ease,
        max-width 0.45s ease,
        width 0.45s ease;
      filter:
        drop-shadow(0 10px 24px rgba(255, 59, 226, 0.16))
        drop-shadow(0 18px 42px rgba(106, 61, 255, 0.20));
    }

    .hero-logo-main {
      width: 100%;
      max-width: 620px;
      opacity: 1;
      transform: scale(1);
    }

    .hero-logo-compact {
      position: absolute;
      width: 100%;
      max-width: 430px;
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .wrap.results-active .header {
      min-height: 90px;
      margin-bottom: 13px;
    }

    .wrap.results-active .header::before {
      inset: -40px -20px -100px -20px;
      filter: blur(24px);
      opacity: 0.75;
    }

    .wrap.results-active .header::after {
      inset: -60px -30px -120px -30px;
      filter: blur(40px);
      opacity: 0.5;
    }

    .wrap.results-active .hero-logo-main {
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .wrap.results-active .hero-logo-compact {
      opacity: 1;
      transform: scale(1);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: -6px;
      margin-bottom: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: font-size 0.45s ease, margin 0.45s ease;
    }
