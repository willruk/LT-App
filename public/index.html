<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
      --spotify: #1DB954;
      --apple: #0b0b0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
      transition: padding 0.45s ease;
    }

    .wrap.results-active {
      padding-top: 7px;
    }

    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      margin-bottom: 26px;
      overflow: visible;
      transition: min-height 0.45s ease, margin-bottom 0.45s ease;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: -80px -40px -220px -40px;
      background:
        radial-gradient(circle at 50% 60%, rgba(255, 138, 61, 0.28), transparent 22%),
        radial-gradient(circle at 50% 55%, rgba(255, 59, 226, 0.30), transparent 36%),
        radial-gradient(circle at 50% 52%, rgba(106, 61, 255, 0.40), transparent 65%);
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
      mask-image: linear-gradient(
        to bottom,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,1) 50%,
        rgba(0,0,0,0.7) 70%,
        rgba(0,0,0,0.25) 88%,
        rgba(0,0,0,0) 100%
      );
      transition: inset 0.45s ease, filter 0.45s ease, opacity 0.45s ease;
    }

    .header::after {
      content: "";
      position: absolute;
      inset: -120px -60px -260px -60px;
      background:
        radial-gradient(circle at 50% 50%, rgba(42, 155, 255, 0.15), transparent 60%);
      filter: blur(60px);
      pointer-events: none;
      z-index: 0;
      opacity: 1;
      transition: inset 0.45s ease, filter 0.45s ease, opacity 0.45s ease;
    }

    .hero-logo {
      position: relative;
      z-index: 1;
      display: block;
      height: auto;
      object-fit: contain;
      animation: logoFade 0.8s ease;
      transition: opacity 0.45s ease, transform 0.45s ease, max-width 0.45s ease, width 0.45s ease;
      filter:
        drop-shadow(0 10px 24px rgba(255, 59, 226, 0.16))
        drop-shadow(0 18px 42px rgba(106, 61, 255, 0.20));
    }

    .hero-logo-main {
      width: 100%;
      max-width: 620px;
      opacity: 1;
      transform: scale(1);
    }

    .hero-logo-compact {
      position: absolute;
      width: 100%;
      max-width: 430px;
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .wrap.results-active .header {
      min-height: 90px;
      margin-bottom: 13px;
    }

    .wrap.results-active .header::before {
      inset: -40px -20px -100px -20px;
      filter: blur(24px);
      opacity: 0.75;
    }

    .wrap.results-active .header::after {
      inset: -60px -30px -120px -30px;
      filter: blur(40px);
      opacity: 0.5;
    }

    .wrap.results-active .hero-logo-main {
      opacity: 0;
      transform: scale(0.94);
      pointer-events: none;
    }

    .wrap.results-active .hero-logo-compact {
      opacity: 1;
      transform: scale(1);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: -6px;
      margin-bottom: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: font-size 0.45s ease, margin 0.45s ease;
    }

    .wrap.results-active .subtitle {
      font-size: 0.88rem;
      margin-top: -2px;
      margin-bottom: 10px;
    }

    .subtitle-icon {
      display: block;
      margin-top: 6px;
      font-size: 1.2rem;
      opacity: 0.7;
    }

    .grid {
      display: block;
      transition: all 0.35s ease;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-top: 14px;
    }

    #entryCard {
      transition: all 0.35s ease;
    }

    .wrap.results-active #entryCard {
      padding: 10px 12px;
    }

    .entry-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .entry-controls input {
      flex: 1;
      margin: 0;
    }

    .entry-controls button {
      width: auto;
      margin: 0;
      padding: 12px 18px;
      white-space: nowrap;
    }

    .wrap.results-active #entryCard label {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .wrap.results-active #entryCard input {
      padding: 10px 14px;
      min-height: 44px;
    }

    .wrap.results-active #entryCard button {
      padding: 10px 18px;
      min-height: 44px;
    }

    .wrap.results-active #rangeNote {
      opacity: 0;
      max-height: 0;
      margin: 0;
      overflow: hidden;
      transform: translateY(-4px);
      pointer-events: none;
    }

    #birthCard {
      display: none;
      opacity: 0;
      transform: translateY(14px);
    }

    .wrap.results-active #birthCard {
      display: block;
      animation: cardReveal 0.45s ease forwards;
    }

    label {
      font-weight: 700;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
      transition: opacity 0.22s ease, max-height 0.22s ease, margin-bottom 0.22s ease, transform 0.22s ease;
      overflow: hidden;
    }

    input {
      width: 100%;
      padding: 14px;
      min-height: 52px;
      border-radius: 12px;
      border: 1px solid #1f2a44;
      background: #0a1020;
      color: white;
      font-size: 1rem;
      transition: padding 0.28s ease, min-height 0.28s ease, border-radius 0.28s ease;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      min-height: 52px;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      cursor: pointer;
      transition: padding 0.28s ease, min-height 0.28s ease, border-radius 0.28s ease, opacity 0.2s ease;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .accent-heading {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .song-hero {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.4rem;
      line-height: 1.2;
      text-align: center;
      margin-bottom: 8px;
    }

    .artist {
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 10px;
      text-align: left;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      transition: all 0.22s ease;
    }

    .spotify-embed {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      background: #0a1020;
      border: 1px solid #1f2a44;
    }

    .spotify-embed iframe {
      display: block;
      width: 100%;
      min-height: 152px;
      border: 0;
    }

    .year-card {
      border-radius: 20px;
      padding: 14px;
      margin-top: 12px;
      background: linear-gradient(180deg, rgba(31,10,48,0.98), rgba(16,7,29,0.96));
      border: 1px solid rgba(255, 59, 226, 0.18);
    }

    .year-card-rich {
      position: relative;
      overflow: hidden;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.03),
        0 8px 20px rgba(0,0,0,0.18);
    }

    .year-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .year-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #b9a6d9;
      font-size: 1rem;
      min-width: 0;
      flex-wrap: wrap;
    }

    .year-card-body {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 14px;
      align-items: start;
    }

    .year-art {
      width: 86px;
      height: 86px;
      border-radius: 16px;
      object-fit: cover;
      display: block;
      box-shadow: 0 10px 26px rgba(0,0,0,0.28);
      background: #140d22;
    }

    .year-copy {
      min-width: 0;
    }

    .year-song-title {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.32rem;
      line-height: 1.08;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .year-song-artist {
      color: #ff9a54;
      font-weight: 700;
      font-size: 0.98rem;
      line-height: 1.25;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .music-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .music-buttons a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
    }

    .music-buttons img {
      display: block;
      height: 34px;
      width: auto;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .music-buttons img:hover {
      transform: scale(1.05);
      opacity: 0.95;
    }

    .trivia-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      background: transparent;
      border: none;
      color: #b8a6d8;
      font-size: 0.98rem;
      font-weight: 600;
      cursor: pointer;
      min-height: auto;
      width: auto;
      margin-top: 0;
    }

    .trivia-toggle:hover {
      color: #e2c9ff;
      opacity: 1;
    }

    .trivia-toggle[aria-expanded="true"] .trivia-caret {
      transform: rotate(180deg);
    }

    .trivia-caret {
      display: inline-block;
      transition: transform 0.22s ease;
    }

    .year-trivia {
      margin-top: 12px;
      color: #d8d0e8;
      line-height: 1.55;
      font-size: 0.94rem;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(181, 189, 212, 0.6);
    }

    .loading-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 18px;
  background: rgba(2, 6, 23, 0.84);
  backdrop-filter: blur(8px);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.45s ease;
  padding: 24px;
}

    .loading-overlay.active {
      display: flex;
      opacity: 1;
      pointer-events: auto;
    }

    .turntable {
  position: relative;
  width: min(72vw, 360px);
  height: min(72vw, 360px);
  margin: 0 auto;
}

.vinyl-wrap {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 260px;
  height: 260px;
  transform: translate(-50%, -50%);
}

.vinyl {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 28%, rgba(255,255,255,.18), transparent 0 18%, transparent 19%),
    radial-gradient(circle at center, #0a0f1c 0 9%, #bcc7d6 9% 10.2%, #101827 10.2% 18%, transparent 18.1%),
    repeating-radial-gradient(circle at center,
      rgba(255,255,255,.055) 0 1px,
      rgba(6,10,18,.96) 1px 5px,
      rgba(19,26,39,.98) 5px 8px,
      rgba(6,10,18,.98) 8px 11px);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.04),
    inset 0 0 24px rgba(255,255,255,0.05),
    0 0 0 14px rgba(15, 23, 42, 0.52),
    0 22px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
  will-change: transform;
  transform: rotate(0deg);
}

.vinyl::before {
  content: "";
  position: absolute;
  inset: 29%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 38% 35%, rgba(255,255,255,.28), transparent 0 16%, transparent 17%),
    radial-gradient(circle at center, #eff6ff 0 10%, #2A9BFF 10% 36%, #FF3BE2 36% 62%, #6A3DFF 62% 100%);
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
}

.vinyl::after {
  content: "";
  position: absolute;
  inset: 48.6%;
  border-radius: 50%;
  background: #f8fafc;
  box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.22);
  z-index: 2;
}

.vinyl-center-icon {
  position: absolute;
  width: 22%;
  max-width: 58px;
  aspect-ratio: 1 / 1;
  object-fit: contain;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  border-radius: 16px;
  pointer-events: none;
}

.vinyl-shine {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 260px;
  height: 260px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(255,255,255,.18), rgba(255,255,255,0) 34%);
  filter: blur(1px);
  pointer-events: none;
  z-index: 2;
}

.tonearm {
  position: absolute;
  right: 34px;
  top: 62px;
  width: 152px;
  height: 12px;
  background: linear-gradient(90deg, #64748b, #94a3b8 42%, #cbd5e1);
  border-radius: 999px;
  transform-origin: 100% 50%;
  transform: rotate(-90deg) scaleX(1);
  box-shadow: 0 2px 10px rgba(0,0,0,.28);
  z-index: 4;
  animation:
    tonearm-seek 3.4s linear forwards,
    tonearm-vibrate 2.2s ease-in-out 3.45s infinite;
}

.tonearm::before {
  content: "";
  position: absolute;
  right: -10px;
  top: -6px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #e2e8f0, #64748b 72%);
  box-shadow: 0 0 0 6px rgba(51,65,85,.45);
}

.tonearm::after {
  content: "";
  position: absolute;
  left: 0;
  top: 1px;
  width: 22px;
  height: 10px;
  border-radius: 3px;
  background: linear-gradient(90deg, #f87171, #e2e8f0);
  box-shadow:
    0 1px 3px rgba(0,0,0,.25),
    0 0 6px rgba(248,113,113,0.18);
  transform-origin: left center;
}


@keyframes tonearm-seek {
  0% {
    transform: rotate(-90deg) scaleX(1);
  }

  10% {
    transform: rotate(-90deg) scaleX(1);
  }

  18% {
    transform: rotate(-88deg) scaleX(1);
  }

  30% {
    transform: rotate(-79deg) scaleX(1);
  }

  44% {
    transform: rotate(-64deg) scaleX(1);
  }

  56% {
    transform: rotate(-56deg) scaleX(1);
  }

  62% {
    transform: rotate(-54deg) scaleX(1);
  }

  67% {
    transform: rotate(-54deg) scaleX(1);
  }

  74% {
    transform: rotate(-56deg) scaleX(1);
  }

  84% {
    transform: rotate(-65deg) scaleX(1);
  }

  93% {
    transform: rotate(-77deg) scaleX(1);
  }

  96% {
    transform: rotate(-80deg) scaleX(1);
  }

  98% {
    transform: rotate(-80deg) scaleX(0.97);
  }

  99% {
    transform: rotate(-80deg) scaleX(0.985);
  }

  100% {
    transform: rotate(-80deg) scaleX(0.94);
  }
}

    @keyframes vinyl-motion {
  0% {
    transform: rotate(0deg);
  }

  3% {
    transform: rotate(0deg);
  }

  7% {
    transform: rotate(4deg);
  }

  12% {
    transform: rotate(16deg);
  }

  18% {
    transform: rotate(42deg);
  }

  28% {
    transform: rotate(95deg);
  }

  42% {
    transform: rotate(190deg);
  }

  58% {
    transform: rotate(340deg);
  }

  74% {
    transform: rotate(540deg);
  }

  100% {
    transform: rotate(900deg);
  }
}
    
    .loading-text {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 10px rgba(0,0,0,.25);
    }

    

    @keyframes logoFade {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardReveal {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }


    @media (max-width: 720px) {
      .wrap {
        padding: 16px 12px 40px;
      }

      .wrap.results-active {
        padding-top: 6px;
      }

      .entry-controls {
        flex-direction: column;
      }

      .entry-controls button {
        width: 100%;
      }

      .header {
        min-height: 150px;
        margin-bottom: 20px;
      }

      .hero-logo-main {
        max-width: 92vw;
      }

      .hero-logo-compact {
        max-width: 82vw;
      }

      .wrap.results-active .header {
        min-height: 70px;
        margin-bottom: 10px;
      }

      .year-card-top {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .music-buttons {
        justify-content: flex-start;
      }

      .music-buttons img {
        height: 32px;
      }

      .year-card-rich {
        padding: 12px 12px 14px;
      }

      .year-meta {
        font-size: 0.92rem;
        margin-bottom: 0;
        gap: 8px;
      }

      .year-card-body {
        grid-template-columns: 72px 1fr;
        gap: 12px;
      }

      .year-art {
        width: 72px;
        height: 72px;
        border-radius: 12px;
      }

      .year-song-title {
        font-size: 1.06rem;
        line-height: 1.12;
        margin-bottom: 7px;
      }

      .year-song-artist {
        font-size: 0.92rem;
        margin-bottom: 10px;
      }

      .trivia-toggle {
        font-size: 0.94rem;
      }

      .year-trivia {
        font-size: 0.9rem;
        margin-top: 10px;
        padding-top: 10px;
      }

      .tonearm {
        right: 7%;
        top: 6%;
        width: 118px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img src="/logo.png" class="hero-logo hero-logo-main" alt="Life Tracks logo" />
      <img src="/logo_horizontal.png" class="hero-logo hero-logo-compact" alt="Life Tracks logo" />
    </div>

    <p class="subtitle">
      Enter your Birthday to discover the #1 song on the day you were born and every Birthday since.
      <span class="subtitle-icon">🎶</span>
    </p>

    <div class="grid">
      <div class="card" id="entryCard">
        <label for="birthday">Your birthday</label>

        <div class="entry-controls">
          <input id="birthday" type="date">
          <button id="go">Find my songs</button>
        </div>

        <p id="rangeNote" class="note"></p>
      </div>

      <div class="card" id="birthCard">
        <h2 class="accent-heading">Number one on the day you were born</h2>
        <div id="birthResult" class="note"></div>
      </div>
    </div>

    <div class="card" id="yearlyCard" style="display:none;">
      <h2 class="accent-heading">Here are the hottest tracks from all of your birthdays</h2>
      <div id="yearlyResult" class="note"></div>
    </div>

    <footer class="footer">
      © Lil' Jill Software Inc. 2026
    </footer>
  </div>

  <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
    <div class="turntable" aria-hidden="true">
      <div class="vinyl-wrap">
  <div class="vinyl">
    <img src="/icon.png" alt="" class="vinyl-center-icon" />
  </div>
</div>
<div class="vinyl-shine"></div>
      <div class="tonearm"></div>
    </div>
    <div class="loading-text">Finding your tracks…</div>
  </div>
  <script src="/app.js?v=25"></script>
</body>
</html>
