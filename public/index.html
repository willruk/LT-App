<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>
  <link rel="icon" type="image/png" href="/icon.png" />

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
      --spotify: #1DB954;
      --apple: #FF2A4B;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 20px 14px 40px;
      max-width: 900px;
      margin: auto;
      transition: padding 0.45s ease;
    }

    .wrap.results-active {
      padding-top: 7px;
    }

    .header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 220px;
      margin-bottom: 26px;
      transition: all 0.45s ease;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: -80px -40px -220px -40px;
      background:
        radial-gradient(circle at 50% 60%, rgba(255, 138, 61, 0.28), transparent 22%),
        radial-gradient(circle at 50% 55%, rgba(255, 59, 226, 0.30), transparent 36%),
        radial-gradient(circle at 50% 52%, rgba(106, 61, 255, 0.40), transparent 65%);
      filter: blur(40px);
      z-index: 0;
      mask-image: linear-gradient(to bottom, black 60%, transparent);
      transition: all 0.45s ease;
    }

    .wrap.results-active .header {
      min-height: 90px;
      margin-bottom: 13px;
    }

    .wrap.results-active .header::before {
      inset: -40px -20px -100px -20px;
      filter: blur(24px);
      opacity: 0.75;
    }

    .hero-logo {
      position: relative;
      z-index: 1;
      max-width: 620px;
      width: 100%;
      transition: all 0.45s ease;
    }

    .hero-logo-compact {
      position: absolute;
      max-width: 430px;
      opacity: 0;
      transform: scale(0.94);
    }

    .wrap.results-active .hero-logo {
      opacity: 0;
    }

    .wrap.results-active .hero-logo-compact {
      opacity: 1;
      transform: scale(1);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 14px;
      transition: all 0.45s ease;
    }

    .wrap.results-active .subtitle {
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .subtitle-icon {
      display: block;
      margin-top: 6px;
      opacity: 0.7;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    .entry-controls {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: #0a1020;
      border: 1px solid #1f2a44;
      color: white;
    }

    button {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      font-weight: bold;
    }

    /* ===================== */
    /* 🎧 TURNTABLE ANIMATION */
    /* ===================== */

    .loading-overlay {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(2, 6, 23, 0.85);
      z-index: 9999;
    }

    .loading-overlay.active {
      display: flex;
    }

    .turntable {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .vinyl {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, #111 40%, #000 70%);
      animation: spin-vinyl 1.5s linear infinite;
      animation-delay: 1.05s;
      animation-fill-mode: backwards;
    }

    @keyframes spin-vinyl {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tonearm {
      position: absolute;
      right: 10%;
      top: 6%;
      width: 120px;
      height: 10px;
      background: #bbb;
      border-radius: 10px;
      transform-origin: 96% 12%;
      transform: rotate(90deg);

      animation:
        tonearm-drop 1.6s cubic-bezier(0.22,1,0.36,1) forwards,
        tonearm-lower 1.6s ease-out forwards;
    }

    @keyframes tonearm-drop {
      0%   { transform: rotate(90deg); }
      78%  { transform: rotate(112deg); }
      88%  { transform: rotate(108deg); }
      100% { transform: rotate(110deg); }
    }

    @keyframes tonearm-lower {
      0%   { margin-top: 0; }
      72%  { margin-top: 0; }
      100% { margin-top: 4px; }
    }

  </style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <img src="/logo.png" class="hero-logo" />
    <img src="/logo_horizontal.png" class="hero-logo-compact" />
  </div>

  <p class="subtitle">
    Enter your Birthday to discover the #1 song on the day you were born and every Birthday since.
    <span class="subtitle-icon">🎶</span>
  </p>

  <div class="card">
    <div class="entry-controls">
      <input type="date" id="birthday">
      <button id="go">Find my songs</button>
    </div>
  </div>

</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="turntable">
    <div class="vinyl"></div>
    <div class="tonearm"></div>
  </div>
</div>

<script src="/app.js?v=13"></script>

</body>
</html>
