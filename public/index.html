<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Tracks</title>

  <style>
    :root {
      --blue: #2A9BFF;
      --pink: #FF3BE2;
      --red: #FF2A4B;
      --orange: #FF8A3D;
      --purple: #6A3DFF;

      --bg: #060915;
      --panel: rgba(16, 21, 37, 0.9);
      --text: #edf2ff;
      --muted: #b5bdd4;
      --border: rgba(106, 61, 255, 0.2);
      --spotify: #1DB954;
      --apple: #FF2A4B;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #040611, #090d1d);
      color: var(--text);
    }

    .wrap {
      padding: 4px 14px 40px;
      max-width: 900px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 4px;
    }

    .hero-logo {
      width: 90%;
      max-width: 620px;
      height: auto;
      object-fit: contain;
      display: block;
      animation: logoFade 0.8s ease;
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.4));
      transition: width 0.45s ease, max-width 0.45s ease, transform 0.45s ease;
    }

    .wrap.results-active .hero-logo {
      width: 54%;
      max-width: 372px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-top: 0;
      margin-bottom: 12px;
      text-align: center;
    }

    .grid {
      display: block;
      transition: all 0.35s ease;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-top: 14px;
    }

    #entryCard {
      transition: all 0.35s ease;
    }

    /* 🔹 COMPACT ENTRY STATE */
    .wrap.results-active #entryCard {
      padding: 10px 12px;
    }

    .wrap.results-active #entryCard input {
      padding: 10px 14px;
      min-height: 44px;
    }

    .wrap.results-active #entryCard button {
      padding: 10px 18px;
      min-height: 44px;
    }

    /* 🔥 HIDE LABEL IN COMPACT STATE */
    .wrap.results-active #entryCard label {
      opacity: 0;
      max-height: 0;
      margin-bottom: 0;
      transform: translateY(-4px);
      pointer-events: none;
    }

    .entry-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .entry-controls input {
      flex: 1;
      margin: 0;
    }

    .entry-controls button {
      width: auto;
      margin: 0;
      padding: 12px 18px;
      white-space: nowrap;
    }

    #birthCard {
      display: none;
      opacity: 0;
      transform: translateY(14px);
    }

    .wrap.results-active #birthCard {
      display: block;
      animation: cardReveal 0.45s ease forwards;
    }

    label {
      font-weight: 700;
      transition: opacity 0.22s ease, max-height 0.22s ease, margin-bottom 0.22s ease, transform 0.22s ease;
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 14px;
      min-height: 52px;
      transition: padding 0.28s ease, min-height 0.28s ease, border-radius 0.28s ease;
      border-radius: 12px;
      border: 1px solid #1f2a44;
      background: #0a1020;
      color: white;
      font-size: 1rem;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      min-height: 52px;
      transition: padding 0.28s ease, min-height 0.28s ease, border-radius 0.28s ease, opacity 0.2s ease;
      border-radius: 12px;
      border: none;
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(90deg, var(--blue), var(--pink), var(--orange));
      color: white;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .accent-heading {
      color: var(--blue);
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 1.05rem;
      line-height: 1.3;
    }

    .song-hero {
      color: var(--pink);
      font-weight: 900;
      font-size: 1.4rem;
      line-height: 1.2;
      text-align: center;
      margin-bottom: 8px;
    }

    .artist {
      color: var(--orange);
      font-weight: 700;
      margin-bottom: 10px;
      text-align: left;
    }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .year-card {
      border-top: 1px solid #1f2a44;
      padding-top: 10px;
      margin-top: 10px;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(181, 189, 212, 0.6);
    }

    @keyframes logoFade {
      from { opacity: 0; transform: translateY(10px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .entry-controls {
        flex-direction: column;
      }

      .entry-controls button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <img src="/logo.png" class="hero-logo" alt="Life Tracks logo" />
    </div>

    <p class="subtitle">
      Enter your birthday and discover the soundtrack of your life 🎶
    </p>

    <div class="grid">
      <div class="card" id="entryCard">
        <label for="birthday">Your birthday</label>

        <div class="entry-controls">
          <input id="birthday" type="date">
          <button id="go">Find my songs</button>
        </div>

        <p id="rangeNote" class="note"></p>
      </div>

      <div class="card" id="birthCard">
        <h2 class="accent-heading">Number one on the day you were born</h2>
        <div id="birthResult" class="note"></div>
      </div>
    </div>

    <div class="card" id="yearlyCard" style="display:none;">
      <h2 class="accent-heading">Your birthday soundtrack</h2>
      <div id="yearlyResult" class="note"></div>
    </div>

    <footer class="footer">
      © Lil' Jill Software Inc. 2026
    </footer>
  </div>

  <script src="/app.js?v=8"></script>
</body>
</html>
